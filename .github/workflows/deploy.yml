name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd ~/react-tailwind-personal-website
            git pull origin main
            docker build -t sinanaas-portfolio .
            docker stop portfolio
            docker rm portfolio
            docker run -d -p 8082:80 --name portfolio sinanaas-portfolio
